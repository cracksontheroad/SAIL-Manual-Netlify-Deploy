<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAIL Ecosystem Map — SAIL Education</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

/* === ANIMATIONS === */
@keyframes float-glow {
  0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.4; }
  50% { transform: translateY(-20px) translateX(10px); opacity: 0.8; }
}
@keyframes float-delayed-glow {
  0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
  50% { transform: translateY(-15px) translateX(-10px); opacity: 0.7; }
}
@keyframes float-slow-glow {
  0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
  50% { transform: translateY(-25px) translateX(5px); opacity: 0.6; }
}
@keyframes drift {
  0% { transform: translateX(0px); }
  100% { transform: translateX(20px); }
}
@keyframes orbit {
  0% { transform: rotate(0deg) translateX(30px) rotate(0deg); }
  100% { transform: rotate(360deg) translateX(30px) rotate(-360deg); }
}
@keyframes breathing {
  0%, 100% { opacity: 0.15; transform: scale(1); }
  50% { opacity: 0.25; transform: scale(1.1); }
}
@keyframes breathing-delayed {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(1.05); }
}
@keyframes rotate-slow {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === RESET & BASE === */
* { box-sizing: border-box; margin: 0; padding: 0; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.2); border-radius: 10px; }
::-webkit-scrollbar-track { background: transparent; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  color: rgba(255,255,255,0.85);
  background: #000;
  line-height: 1.7;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* === IMMERSIVE BACKGROUND === */
.immersive-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.immersive-bg .gradient-base {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #1e1b4b 0%, #3b0764 40%, #0f172a 100%);
}
.immersive-bg .bg-image {
  position: absolute;
  inset: 0;
  background-image: url('https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/8d0c8cab-aafd-4759-951d-82f748461c75_3840w.jpg');
  background-size: cover;
  background-position: center;
  opacity: 0.4;
}
.particle { position: absolute; border-radius: 50%; filter: blur(1px); }
.particle-1 { top: 25%; left: 33%; width: 2px; height: 2px; background: rgba(96,165,250,0.4); animation: float-glow 4s ease-in-out infinite; }
.particle-2 { top: 75%; right: 25%; width: 1px; height: 1px; background: rgba(167,139,250,0.5); animation: float-delayed-glow 5s ease-in-out infinite; }
.particle-3 { bottom: 33%; left: 50%; width: 1.5px; height: 1.5px; background: rgba(244,114,182,0.3); animation: float-slow-glow 6s ease-in-out infinite; }
.particle-4 { top: 50%; right: 33%; width: 1px; height: 1px; background: rgba(34,211,238,0.4); animation: drift 8s ease-in-out infinite alternate; }
.particle-5 { bottom: 25%; left: 25%; width: 2px; height: 2px; background: rgba(129,140,248,0.3); animation: orbit 15s linear infinite; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); }
.orb-1 { top: -50px; right: -50px; width: 384px; height: 384px; background: radial-gradient(circle, rgba(59,130,246,0.15), transparent); animation: breathing 4s ease-in-out infinite; }
.orb-2 { bottom: -50px; left: -50px; width: 320px; height: 320px; background: radial-gradient(circle, rgba(168,85,247,0.2), transparent); animation: breathing-delayed 4s ease-in-out infinite 2s; }
.orb-3 { top: 50%; left: 50%; width: 256px; height: 256px; background: radial-gradient(circle, rgba(236,72,153,0.1), transparent); animation: rotate-slow 20s linear infinite; }

body > * { position: relative; z-index: 1; }

/* === HEADER === */
#header {
  background: rgba(255,255,255,0.06);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  backdrop-filter: blur(40px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,0.15);
  padding: 14px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  flex-shrink: 0;
  animation: fadeIn 0.6s ease-out;
}
#logo {
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.02em;
}
#logo-sub {
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-left: 12px;
  text-transform: uppercase;
}
#header-hint {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  font-weight: 400;
}

/* === CANVAS === */
#canvas-wrap {
  position: relative;
  flex: 1;
  overflow: hidden;
}
svg { width: 100%; height: 100%; }

/* === TOOLTIP BAR === */
#tooltip-bar {
  background: rgba(255,255,255,0.06);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  backdrop-filter: blur(40px) saturate(180%);
  border-top: 1px solid rgba(255,255,255,0.15);
  padding: 10px 28px;
  min-height: 52px;
  display: flex;
  align-items: center;
  gap: 18px;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
#tooltip-bar.empty { opacity: 0.5; }
.tb-title { font-size: 14px; font-weight: 700; white-space: nowrap; color: rgba(255,255,255,0.7); }
.tb-desc { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.5; flex: 1; }
.tb-connections { font-size: 11px; color: rgba(255,255,255,0.4); white-space: nowrap; max-width: 360px; overflow: hidden; text-overflow: ellipsis; }

/* === LEGEND === */
#legend {
  position: absolute;
  bottom: 14px;
  left: 16px;
  background: rgba(255,255,255,0.06);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 14px 18px;
  z-index: 50;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
  animation: fadeIn 0.8s ease-out 0.3s both;
}
.legend-title {
  font-size: 9px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  font-weight: 700;
}
.legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 6px rgba(255,255,255,0.15); }
.legend-label { font-size: 10px; color: rgba(255,255,255,0.6); }
.legend-line { border-radius: 2px; }
.legend-divider { margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>

<!-- Immersive Background -->
<div class="immersive-bg">
  <div class="gradient-base"></div>
  <div class="bg-image"></div>
  <div class="particle particle-1"></div>
  <div class="particle particle-2"></div>
  <div class="particle particle-3"></div>
  <div class="particle particle-4"></div>
  <div class="particle particle-5"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div id="header">
  <div style="display:flex;align-items:baseline"><span id="logo">SAIL</span><span id="logo-sub">Ecosystem Map</span></div>
  <div id="header-hint">Hover any node to highlight connections</div>
</div>
<div id="canvas-wrap">
  <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="legend">
    <div class="legend-title">Key</div>
    <div class="legend-row"><div class="legend-dot" style="background:#c084fc"></div><div class="legend-label">SAIL Core</div></div>
    <div class="legend-row"><div class="legend-dot" style="background:#60a5fa"></div><div class="legend-label">App</div></div>
    <div class="legend-row"><div class="legend-dot" style="background:#818cf8"></div><div class="legend-label">Feature</div></div>
    <div class="legend-row"><div class="legend-dot" style="background:#f472b6"></div><div class="legend-label">Audience</div></div>
    <div class="legend-row legend-divider"><div style="width:16px;height:3px;background:rgba(96,165,250,0.7);border-radius:2px"></div><div class="legend-label">App ↔ App (solid thick)</div></div>
    <div class="legend-row"><div style="width:16px;height:1.5px;background:rgba(244,114,182,0.7)"></div><div class="legend-label">App ↔ Audience (solid thin)</div></div>
    <div class="legend-row"><div style="width:16px;height:0;border-top:1.5px dashed rgba(129,140,248,0.7)"></div><div class="legend-label">To Features (dashed)</div></div>
  </div>
</div>
<div id="tooltip-bar" class="empty">
  <div class="tb-title" id="tb-title">Hover a node to see details</div>
  <div class="tb-desc" id="tb-desc"></div>
  <div class="tb-connections" id="tb-conn"></div>
</div>

<script>
/* ─── THEME COLORS (matching SAIL manual palette) ─── */
const COL = {
  core:    { fill: '#a855f7', edge: '#c084fc' },     /* purple */
  app:     { fill: '#3b82f6', edge: '#60a5fa' },     /* blue */
  feature: { fill: '#6366f1', edge: '#818cf8' },     /* indigo */
  audience:{ fill: '#ec4899', edge: '#f472b6' }      /* pink */
};

/* ─── TEXT FITTING ENGINE ─── */
const _canvas = document.createElement('canvas');
const _ctx = _canvas.getContext('2d');
function measureText(text, fontSize, fontWeight) {
  _ctx.font = `${fontWeight} ${fontSize}px Inter, -apple-system, system-ui, sans-serif`;
  return _ctx.measureText(text).width;
}
function fitText(label, radius, type) {
  const padding = 0.75;
  const maxWidth = radius * 2 * padding;
  const weight = type === 'core' ? 900 : 700;
  let targetFs = type === 'core' ? 15 : type === 'app' ? 10.5 : type === 'audience' ? 9.5 : 8.5;
  const words = label.replace(/\n/g, ' ').split(' ');
  for (let fs = targetFs; fs >= 5.5; fs -= 0.5) {
    const lineHeight = fs * 1.3;
    const lines = [];
    let currentLine = '';
    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const w = measureText(testLine, fs, weight);
      if (w > maxWidth && currentLine) { lines.push(currentLine); currentLine = word; }
      else { currentLine = testLine; }
    }
    if (currentLine) lines.push(currentLine);
    const totalHeight = lines.length * lineHeight;
    const maxHeight = radius * 2 * padding;
    let allFit = totalHeight <= maxHeight;
    if (allFit) { for (const line of lines) { if (measureText(line, fs, weight) > maxWidth) { allFit = false; break; } } }
    if (allFit) return { lines, fontSize: fs, lineHeight };
  }
  const fs = 5.5, lineHeight = fs * 1.3;
  return { lines: words, fontSize: fs, lineHeight };
}

/* ─── DATA ─── */
const APPS = [
  {id:'edu',     label:'SAIL Edu',              desc:'Flagship LMS (v3). Full classroom management with teacher + student + parent + admin roles.'},
  {id:'ss',      label:'SuperStudent',          desc:'Standalone student app — all student-facing features from EduNexus as a personal learning companion.'},
  {id:'st',      label:'SuperTeacher',          desc:'Standalone teacher app — all teacher-facing features from EduNexus as a personal teaching tool.'},
  {id:'lifeos',  label:'Life-OS',               desc:'Personal life management PWA. 6 domains, 5 AI coaches (Clarity, Capital, Momentum, Fuel, Anchor).'},
  {id:'ielts',   label:'IELTS-OS',              desc:'IELTS preparation system. All four skills plus vocabulary, AI feedback and score tracking.'},
  {id:'wealth',  label:'Wealth-OS',             desc:'Investment dashboard. 3-layer portfolio, AI coach, projector, rebalancer, Strategy Lab.'},
  {id:'compass', label:'Compass',               desc:'College application OS for G11-12 students. School research, essays, milestones, readiness scoring.'},
  {id:'compassc',label:'Compass Counsellor',    desc:'Counsellor app. Student cohort tracking, recommendation management, pipeline analytics.'},
];
const FEATURES = [
  {id:'f_gb',  parent:'edu',    label:'Gradebook'},
  {id:'f_alp', parent:'edu',    label:'AI Lessons'},
  {id:'f_pr',  parent:'edu',    label:'Peer Review'},
  {id:'f_prpt',parent:'edu',    label:'Parent Reports'},
  {id:'f_mod', parent:'edu',    label:'Moderation'},
  {id:'f_sa',  parent:'ss',     label:'Assignments'},
  {id:'f_spf', parent:'ss',     label:'Peer Feedback'},
  {id:'f_spt', parent:'ss',     label:'Progress'},
  {id:'f_sai', parent:'ss',     label:'AI Coach'},
  {id:'f_tg',  parent:'st',     label:'Grading'},
  {id:'f_tl',  parent:'st',     label:'AI Lessons'},
  {id:'f_tr',  parent:'st',     label:'Reports'},
  {id:'f_tm',  parent:'st',     label:'Moderation'},
  {id:'f_lc',  parent:'lifeos', label:'5 AI Coaches'},
  {id:'f_ld',  parent:'lifeos', label:'6 Domains'},
  {id:'f_lf',  parent:'lifeos', label:'Fear-Setting'},
  {id:'f_ir',  parent:'ielts',  label:'Reading'},
  {id:'f_iw',  parent:'ielts',  label:'Writing'},
  {id:'f_is',  parent:'ielts',  label:'Speaking'},
  {id:'f_il',  parent:'ielts',  label:'Listening'},
  {id:'f_iv',  parent:'ielts',  label:'Vocabulary'},
  {id:'f_ia',  parent:'ielts',  label:'AI Feedback'},
  {id:'f_wp',  parent:'wealth', label:'Portfolio'},
  {id:'f_wc',  parent:'wealth', label:'AI Coach'},
  {id:'f_wr',  parent:'wealth', label:'Projector'},
  {id:'f_wl',  parent:'wealth', label:'Strategy Lab'},
  {id:'f_cs',  parent:'compass',label:'Schools'},
  {id:'f_ce',  parent:'compass',label:'Essays'},
  {id:'f_cm',  parent:'compass',label:'Milestones'},
  {id:'f_cr',  parent:'compass',label:'Readiness'},
  {id:'f_ca',  parent:'compass',label:'Activities'},
  {id:'f_cco', parent:'compassc',label:'Cohort'},
  {id:'f_ccp', parent:'compassc',label:'Progress'},
  {id:'f_ccr', parent:'compassc',label:'Recs Mgmt'},
];
const AUDIENCES = [
  {id:'a_sch', label:'Schools',            desc:'Administrators evaluating AI literacy programs.'},
  {id:'a_tch', label:'Teachers',           desc:'Educators using SAIL for instruction and planning.'},
  {id:'a_par', label:'Parents',            desc:'Parents tracking student progress.'},
  {id:'a_stu', label:'Students',           desc:'G11-12 students, international-track learners.'},
  {id:'a_lll', label:'Life-Long Learners', desc:'Adults: IELTS, finance, personal development.'},
];
const APP_LINKS = [
  {from:'edu',to:'ss'},{from:'edu',to:'st'},{from:'edu',to:'compass'},
  {from:'edu',to:'ielts'},{from:'edu',to:'compassc'},{from:'edu',to:'lifeos'},
  {from:'compass',to:'compassc'},{from:'ielts',to:'ss'},{from:'lifeos',to:'wealth'},
];
const AUD_APP = [
  {aud:'a_sch', apps:['edu','st','compassc']},
  {aud:'a_tch', apps:['edu','st','compassc']},
  {aud:'a_par', apps:['edu','compass']},
  {aud:'a_stu', apps:['edu','ss','compass','ielts']},
  {aud:'a_lll', apps:['lifeos','wealth','ielts']},
];
const AUD_FEAT = [
  {aud:'a_stu', feats:['f_sa','f_spt','f_ce','f_cr','f_ir','f_iw']},
  {aud:'a_tch', feats:['f_alp','f_tg','f_tl','f_gb']},
  {aud:'a_par', feats:['f_prpt','f_tr','f_cm']},
  {aud:'a_sch', feats:['f_mod','f_cco']},
  {aud:'a_lll', feats:['f_lc','f_wc','f_ia','f_iv']},
];

/* ─── LAYOUT ─── */
const CX = 550, CY = 340;
const POS = {};
function calcRadius(label, type, minR) {
  for (let r = minR; r <= 60; r += 1) {
    const test = fitText(label, r, type);
    const totalH = test.lines.length * test.lineHeight;
    const maxH = r * 2 * 0.75;
    let allGood = totalH <= maxH;
    if (allGood) { for (const line of test.lines) { if (measureText(line, test.fontSize, 700) > r * 2 * 0.75) { allGood = false; break; } } }
    if (allGood && test.fontSize >= 6) return r;
  }
  return minR;
}
POS.sail = {x:CX, y:CY, r: calcRadius('SAIL', 'core', 36)};
const appDefs = [
  {id:'edu',      x:CX,      y:CY-160,  minR:30},
  {id:'ss',       x:CX+140,  y:CY-105,  minR:30},
  {id:'st',       x:CX+165,  y:CY+20,   minR:30},
  {id:'lifeos',   x:CX+130,  y:CY+130,  minR:28},
  {id:'ielts',    x:CX,      y:CY+170,  minR:28},
  {id:'wealth',   x:CX-140,  y:CY+130,  minR:28},
  {id:'compass',  x:CX-170,  y:CY+10,   minR:28},
  {id:'compassc', x:CX-140,  y:CY-105,  minR:32},
];
appDefs.forEach(d => {
  const app = APPS.find(a => a.id === d.id);
  POS[d.id] = {x:d.x, y:d.y, r: calcRadius(app.label, 'app', d.minR)};
});
const UP = -Math.PI/2, DOWN = Math.PI/2, LEFT = Math.PI, RIGHT = 0;
const UL = -Math.PI*0.75, UR = -Math.PI*0.25, DL = Math.PI*0.75, DR = Math.PI*0.25;
function fanFeatures(parentId, featureIds, baseAngle, spread, dist) {
  const px = POS[parentId].x, py = POS[parentId].y;
  const start = baseAngle - ((featureIds.length - 1) * spread) / 2;
  featureIds.forEach((fid, i) => {
    const a = start + i * spread;
    const feat = FEATURES.find(f => f.id === fid);
    POS[fid] = { x: px + Math.cos(a) * dist, y: py + Math.sin(a) * dist, r: calcRadius(feat.label, 'feature', 18) };
  });
}
fanFeatures('edu',      ['f_gb','f_alp','f_pr','f_prpt','f_mod'],    UP,    0.45, 88);
fanFeatures('ss',       ['f_sa','f_spf','f_spt','f_sai'],            UR,    0.44, 82);
fanFeatures('st',       ['f_tg','f_tl','f_tr','f_tm'],               RIGHT, 0.44, 82);
fanFeatures('lifeos',   ['f_lc','f_ld','f_lf'],                      DR,    0.48, 82);
fanFeatures('ielts',    ['f_ir','f_iw','f_is','f_il','f_iv','f_ia'], DOWN,  0.38, 88);
fanFeatures('wealth',   ['f_wp','f_wc','f_wr','f_wl'],               DL,    0.44, 82);
fanFeatures('compass',  ['f_cs','f_ce','f_cm','f_cr','f_ca'],        LEFT,  0.40, 85);
fanFeatures('compassc', ['f_cco','f_ccp','f_ccr'],                   UL,    0.48, 80);
POS['a_stu'] = {x: CX + 330, y: CY - 170, r: calcRadius('Students', 'audience', 26)};
POS['a_tch'] = {x: CX + 350, y: CY + 50,  r: calcRadius('Teachers', 'audience', 26)};
POS['a_par'] = {x: CX - 360, y: CY + 90,  r: calcRadius('Parents', 'audience', 26)};
POS['a_sch'] = {x: CX - 330, y: CY - 150, r: calcRadius('Schools', 'audience', 26)};
POS['a_lll'] = {x: CX,       y: CY + 330, r: calcRadius('Life-Long Learners', 'audience', 30)};

/* ─── COLLISION RESOLUTION ─── */
function resolveCollisions(iterations) {
  const ids = Object.keys(POS);
  for (let iter = 0; iter < iterations; iter++) {
    let moved = false;
    for (let i = 0; i < ids.length; i++) {
      for (let j = i + 1; j < ids.length; j++) {
        const a = POS[ids[i]], b = POS[ids[j]];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const minDist = a.r + b.r + 8;
        if (dist < minDist && dist > 0.1) {
          moved = true;
          const push = (minDist - dist) / 2 + 0.5;
          const nx = dx/dist, ny = dy/dist;
          if (ids[i] === 'sail') { b.x += nx*push*2; b.y += ny*push*2; }
          else if (ids[j] === 'sail') { a.x -= nx*push*2; a.y -= ny*push*2; }
          else { a.x -= nx*push; a.y -= ny*push; b.x += nx*push; b.y += ny*push; }
        }
      }
    }
    if (!moved) break;
  }
}
resolveCollisions(50);

/* ─── ALL NODES ─── */
const ALL = [
  {id:'sail', label:'SAIL', type:'core', desc:'Student Artificial Intelligence Learning — parent brand at sailedu.co'},
  ...APPS.map(a => ({...a, type:'app'})),
  ...FEATURES.map(f => ({...f, type:'feature'})),
  ...AUDIENCES.map(a => ({...a, type:'audience'})),
];
function find(id) { return ALL.find(n => n.id === id); }
function getConn(id) {
  const s = new Set();
  if (id === 'sail') APPS.forEach(a => s.add(a.id));
  APPS.forEach(a => { if (a.id === id) s.add('sail'); });
  FEATURES.forEach(f => { if (f.parent === id) s.add(f.id); if (f.id === id) s.add(f.parent); });
  AUD_APP.forEach(l => { if (l.aud === id) l.apps.forEach(a => s.add(a)); if (l.apps.includes(id)) s.add(l.aud); });
  AUD_FEAT.forEach(l => { if (l.aud === id) l.feats.forEach(f => s.add(f)); if (l.feats?.includes(id)) s.add(l.aud); });
  APP_LINKS.forEach(l => { if (l.from === id) s.add(l.to); if (l.to === id) s.add(l.from); });
  return s;
}

/* ─── RENDER ─── */
const svg = document.getElementById('map');
let hov = null;
function render() {
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  Object.values(POS).forEach(p => {
    minX = Math.min(minX, p.x - p.r - 12);
    maxX = Math.max(maxX, p.x + p.r + 12);
    minY = Math.min(minY, p.y - p.r - 12);
    maxY = Math.max(maxY, p.y + p.r + 12);
  });
  const pad = 15;
  svg.setAttribute('viewBox', `${minX-pad} ${minY-pad} ${maxX-minX+pad*2} ${maxY-minY+pad*2}`);

  let o = `<defs>
    <filter id="glow-sm">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glass-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="0" dy="3" result="shifted"/>
      <feFlood flood-color="#000" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="shifted" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glass-shadow-hover">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="shifted"/>
      <feFlood flood-color="#000" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="shifted" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  let gradIdx = 0;
  const conn = hov ? getConn(hov) : null;

  function edge(a, b, col, baseOp, baseSW, dashed) {
    const fp = POS[a], tp = POS[b]; if (!fp || !tp) return;
    let op = baseOp, sw = baseSW;
    if (hov) {
      if (a === hov || b === hov) { op = 0.85; sw = baseSW * 1.5; }
      else { op = 0.04; }
    }
    const mx=(fp.x+tp.x)/2, my=(fp.y+tp.y)/2, dx=tp.x-fp.x, dy=tp.y-fp.y;
    const cx=mx-dy*0.05, cy=my+dx*0.05;
    const isHovered = hov && (a === hov || b === hov);
    o += `<path d="M${fp.x},${fp.y} Q${cx},${cy} ${tp.x},${tp.y}" fill="none" stroke="${col}" stroke-width="${sw}" opacity="${op}"${dashed?' stroke-dasharray="5,3"':''}${isHovered?' filter="url(#glow-sm)"':''}/>`;
  }

  /* Edges */
  APPS.forEach(a => edge('sail', a.id, '#c084fc', 0.4, 2.8, false));
  APP_LINKS.forEach(l => edge(l.from, l.to, '#60a5fa', 0.35, 2.8, false));
  AUD_APP.forEach(l => l.apps.forEach(a => edge(l.aud, a, '#f472b6', 0.3, 1, false)));
  FEATURES.forEach(f => edge(f.parent, f.id, '#818cf8', 0.25, 1, true));
  AUD_FEAT.forEach(l => l.feats.forEach(f => edge(l.aud, f, '#a78bfa', 0.15, 0.8, true)));

  function node(id, type) {
    const p = POS[id]; if (!p) return;
    const c = COL[type];
    let scale = 1, ring = false;
    if (hov) {
      if (id === hov) { scale = 1.06; ring = true; }
    }
    const r = p.r * scale;
    const n = find(id); if (!n) return;
    const gi = gradIdx++;
    const hex = c.fill;
    const hr = parseInt(hex.slice(1,3),16), hg = parseInt(hex.slice(3,5),16), hb = parseInt(hex.slice(5,7),16);

    /* Glass gradient — translucent with color tint */
    o += `<radialGradient id="bg${gi}" cx="40%" cy="35%" r="65%" fx="35%" fy="30%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="40%" stop-color="rgba(${hr},${hg},${hb},0.35)"/>
      <stop offset="100%" stop-color="rgba(${hr},${hg},${hb},0.55)"/>
    </radialGradient>`;

    /* Rim light */
    o += `<linearGradient id="rim${gi}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>`;

    /* Specular highlight */
    o += `<radialGradient id="spec${gi}" cx="32%" cy="26%" r="24%" fx="30%" fy="24%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>`;

    /* Hover glow ring */
    if (ring) {
      o += `<circle cx="${p.x}" cy="${p.y}" r="${r+7}" fill="none" stroke="${hex}" stroke-width="2" opacity="0.4" filter="url(#glow-lg)"/>`;
      o += `<circle cx="${p.x}" cy="${p.y}" r="${r+4}" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>`;
    }

    /* Main glass body */
    o += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="url(#bg${gi})" data-id="${id}" class="nc" style="cursor:pointer" filter="url(#${ring?'glass-shadow-hover':'glass-shadow'})"/>`;
    /* Rim stroke */
    o += `<circle cx="${p.x}" cy="${p.y}" r="${r - 0.5}" fill="none" stroke="url(#rim${gi})" stroke-width="1.5" style="pointer-events:none"/>`;
    /* Inner border — glass edge */
    o += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" style="pointer-events:none"/>`;
    /* Specular */
    const spR = r * 0.32, spX = p.x - r * 0.2, spY = p.y - r * 0.26;
    o += `<ellipse cx="${spX}" cy="${spY}" rx="${spR}" ry="${spR * 0.55}" fill="url(#spec${gi})" opacity="0.7" style="pointer-events:none"/>`;

    /* Text */
    const fit = fitText(n.label, r, type);
    const sy = p.y - ((fit.lines.length - 1) * fit.lineHeight) / 2;
    const ff = "'Inter',-apple-system,system-ui,sans-serif";
    const fw = type === 'core' ? 900 : 700;
    fit.lines.forEach((line, i) => {
      o += `<text x="${p.x + 0.5}" y="${sy + i * fit.lineHeight + 0.5}" text-anchor="middle" dominant-baseline="central" font-size="${fit.fontSize}" font-weight="${fw}" fill="rgba(0,0,0,0.35)" style="pointer-events:none;font-family:${ff}">${line}</text>`;
      o += `<text x="${p.x}" y="${sy + i * fit.lineHeight}" text-anchor="middle" dominant-baseline="central" font-size="${fit.fontSize}" font-weight="${fw}" fill="#fff" style="pointer-events:none;font-family:${ff}">${line}</text>`;
    });
  }

  FEATURES.forEach(f => node(f.id, 'feature'));
  AUDIENCES.forEach(a => node(a.id, 'audience'));
  APPS.forEach(a => node(a.id, 'app'));
  node('sail', 'core');

  svg.innerHTML = o;
  document.querySelectorAll('.nc').forEach(el => {
    const id = el.dataset.id;
    el.addEventListener('mouseenter', () => { hov = id; render(); showBar(id); });
    el.addEventListener('mouseleave', () => { hov = null; render(); hideBar(); });
  });
}

const bar = document.getElementById('tooltip-bar');
const bTitle = document.getElementById('tb-title');
const bDesc = document.getElementById('tb-desc');
const bConn = document.getElementById('tb-conn');
const BRIGHT = {core:'#c084fc', app:'#93c5fd', feature:'#a5b4fc', audience:'#f9a8d4'};

function showBar(id) {
  const n = find(id); if (!n) return;
  bar.classList.remove('empty');
  bTitle.textContent = (n.label || '');
  bTitle.style.color = BRIGHT[n.type || 'core'];
  let desc = n.desc || '';
  if (n.type === 'feature') { const par = find(n.parent); desc = 'Part of ' + (par?.label || ''); }
  if (n.type === 'audience') {
    const links = AUD_APP.find(l => l.aud === id);
    if (links) desc += ' \u2192 ' + links.apps.map(a => find(a)?.label || '').join(', ');
  }
  bDesc.textContent = desc;
  const connected = getConn(id);
  const names = [];
  connected.forEach(cid => { const cn = find(cid); if (cn && cn.type !== 'feature') names.push(cn.label || ''); });
  bConn.textContent = names.length ? 'Links: ' + names.join(', ') : '';
}

function hideBar() {
  bar.classList.add('empty');
  bTitle.textContent = 'Hover a node to see details';
  bTitle.style.color = 'rgba(255,255,255,0.4)';
  bDesc.textContent = '';
  bConn.textContent = '';
}

render();
window.addEventListener('resize', render);
</script>
</body>
</html>
