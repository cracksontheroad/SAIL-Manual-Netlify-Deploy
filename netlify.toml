[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com https://hoirqrkdgbmvpwutwuwj.supabase.co; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com"

[[redirects]]
  from = "/helm"
  to = "/SAIL-Helm-Manual.html"
  status = 200

