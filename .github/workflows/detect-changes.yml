name: Flag Manual Updates
on:
  push:
    branches: [main]
    paths: ['apps/**']
jobs:
  flag:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 2}
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - id: files
        run: echo "changed=$(git diff --name-only HEAD~1 HEAD -- apps/)" >> $GITHUB_OUTPUT
      - if: steps.files.outputs.changed != ''
        run: python scripts/detect-changes.py "${{ steps.files.outputs.changed }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
